# deploy/helm/values.yaml
# Base defaults — all values are overridden by Terraform's helm_release (traceroot.tf)

global:
  security:
    allowInsecureImages: true

imagePullPolicy: Always

serviceAccount:
  create: true
  name: traceroot
  annotations: {}

# --- Services ---
web:
  image:
    repository: ""
    tag: "latest"
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

rest:
  image:
    repository: ""
    tag: "latest"
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

worker:
  image:
    repository: ""
    tag: "latest"
  replicas: 1
  pollIntervalSeconds: "5"
  batchSize: "100"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

billing:
  image:
    repository: ""
    tag: "latest"
  replicas: 1
  usageMeteringCron: "5 * * * *"
  resources:
    requests:
      cpu: "128m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

agent:
  image:
    repository: ""
    tag: "latest"
  replicas: 1
  port: 8100
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# --- Ingress (overridden by Terraform with TLS config) ---
ingress:
  enabled: true
  className: alb
  host: ""
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'

# --- External services (injected by Terraform) ---
postgresql:
  host: ""
  database: ""
  existingSecret: "traceroot"
  secretKeys:
    databaseUrl: "database-url"
    password: "postgres-password"

redis:
  existingSecret: "traceroot"
  secretKeys:
    url: "redis-url"

s3:
  bucket: ""
  region: ""
  endpoint: ""
  forcePathStyle: false

# --- ClickHouse (Bitnami subchart) ---
clickhouse:
  deploy: true
  image:
    repository: bitnamilegacy/clickhouse
  auth:
    username: default
    existingSecret: "traceroot"
    existingSecretKey: "clickhouse-password"
  replicaCount: 1
  shards: 1
  zookeeper:
    enabled: false
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "efs"

# --- Migrations ---
migrations:
  postgres:
    image:
      repository: ""
      tag: "latest"
  clickhouse:
    image:
      repository: ""
      tag: "latest"

# --- Secrets (managed by Terraform) ---
secrets:
  existingSecret: "traceroot"
  keys:
    nextauthSecret: "nextauth-secret"
    internalApiSecret: "internal-api-secret"
    encryptionKey: "encryption-key"

github:
  existingSecret: ""
  keys:
    appId: "github-app-id"
    appName: "github-app-name"
    clientId: "github-app-client-id"
    clientSecret: "github-app-client-secret"
    privateKey: "github-app-private-key"
    oauthRedirectUri: "github-oauth-redirect-uri"

llmKeys:
  existingSecret: ""
  keys:
    anthropicApiKey: "anthropic-api-key"
    openaiApiKey: "openai-api-key"
    daytonaApiKey: "daytona-api-key"

nextauth:
  url: ""

# --- Feature flags ---
enableBilling: "true"

# --- Sandbox provider ---
sandboxProvider: "daytona"

# --- Branding / Public URLs ---
branding:
  logoUrl: "https://raw.githubusercontent.com/traceroot-ai/traceroot/main/frontend/ui/public/images/traceroot_icon.png"
  docsUrl: "https://docs.traceroot.ai"
  githubRepoUrl: "https://github.com/traceroot-ai/traceroot"
  githubIssuesUrl: "https://github.com/traceroot-ai/traceroot/issues"
  discordInviteUrl: "https://discord.com/invite/tPyffEZvvJ"

# --- Stripe (optional — set existingSecret to enable) ---
stripe:
  existingSecret: ""
  keys:
    secretKey: "stripe-secret-key"
    webhookSigningSecret: "stripe-webhook-signing-secret"
    priceIdStarter: "stripe-price-id-starter"
    priceIdPro: "stripe-price-id-pro"
    priceIdStartups: "stripe-price-id-startups"
    priceIdAiUsage: "stripe-price-id-ai-usage"

# --- Google OAuth (optional — set existingSecret to enable) ---
googleOAuth:
  existingSecret: ""
  keys:
    clientId: "google-client-id"
    clientSecret: "google-client-secret"

# --- Email / SMTP (optional — set existingSecret to enable) ---
smtp:
  existingSecret: ""
  keys:
    url: "smtp-url"
    mailFrom: "smtp-mail-from"

# --- Enterprise license (optional) ---
enterprise:
  existingSecret: ""
  keys:
    licenseKey: "ee-license-key"

# --- Additional environment variables (escape hatch for anything not covered above) ---
additionalEnv: []
