# deploy/helm/values.production.yaml
# Same ECR repos, different database and higher replicas

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "<IRSA_ROLE_ARN>"  # From: terraform output irsa_role_arn

web:
  image:
    repository: "<ECR_ACCOUNT>.dkr.ecr.us-east-1.amazonaws.com/traceroot-web"
  replicas: 2

rest:
  image:
    repository: "<ECR_ACCOUNT>.dkr.ecr.us-east-1.amazonaws.com/traceroot-rest"
  replicas: 2

worker:
  image:
    repository: "<ECR_ACCOUNT>.dkr.ecr.us-east-1.amazonaws.com/traceroot-worker"
  replicas: 1

billing:
  image:
    repository: "<ECR_ACCOUNT>.dkr.ecr.us-east-1.amazonaws.com/traceroot-billing"
  replicas: 1

agent:
  image:
    repository: "<ECR_ACCOUNT>.dkr.ecr.us-east-1.amazonaws.com/traceroot-agent"
  replicas: 1

migrations:
  clickhouse:
    image:
      repository: "<ECR_ACCOUNT>.dkr.ecr.us-east-1.amazonaws.com/traceroot-migrate-clickhouse"

nextauth:
  url: ""  # Will be custom domain later

postgresql:
  host: "<RDS_ENDPOINT>"
  database: "traceroot_production"

s3:
  bucket: "<S3_BUCKET>"
  region: "us-east-1"
