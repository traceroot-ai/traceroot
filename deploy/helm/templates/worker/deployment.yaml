apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "traceroot.fullname" . }}-worker
  labels:
    {{- include "traceroot.labels" . | nindent 4 }}
    app: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "traceroot.selectorLabels" . | nindent 6 }}
      app: worker
  template:
    metadata:
      labels:
        {{- include "traceroot.selectorLabels" . | nindent 8 }}
        app: worker
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: CLICKHOUSE_HOST
              value: {{ include "traceroot.clickhouse.hostname" . | quote }}
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: CLICKHOUSE_NATIVE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.auth.existingSecret }}
                  key: {{ .Values.clickhouse.auth.existingSecretKey }}
            - name: CLICKHOUSE_DATABASE
              value: "default"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.secretKeys.url }}
            - name: REDIS_RESULT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.secretKeys.url }}
            - name: S3_BUCKET_NAME
              value: {{ .Values.s3.bucket | quote }}
            - name: S3_ENDPOINT_URL
              value: {{ .Values.s3.endpoint | quote }}
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.s3.region | quote }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
