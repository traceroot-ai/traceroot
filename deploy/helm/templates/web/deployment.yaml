apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "traceroot.fullname" . }}-web
  labels:
    {{- include "traceroot.labels" . | nindent 4 }}
    app: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "traceroot.selectorLabels" . | nindent 6 }}
      app: web
  template:
    metadata:
      labels:
        {{- include "traceroot.selectorLabels" . | nindent 8 }}
        app: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.databaseUrl }}
            - name: NEXTAUTH_URL
              value: {{ .Values.nextauth.url | quote }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.keys.nextauthSecret }}
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.keys.internalApiSecret }}
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ include "traceroot.fullname" . }}-rest:{{ .Values.rest.port }}/api/v1"
            - name: HOSTNAME
              value: "0.0.0.0"
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.web.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.web.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
