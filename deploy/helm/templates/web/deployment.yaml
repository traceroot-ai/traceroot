apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "traceroot.fullname" . }}-web
  labels:
    {{- include "traceroot.labels" . | nindent 4 }}
    app: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "traceroot.selectorLabels" . | nindent 6 }}
      app: web
  template:
    metadata:
      labels:
        {{- include "traceroot.selectorLabels" . | nindent 8 }}
        app: web
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.databaseUrl }}
            - name: BETTER_AUTH_URL
              value: {{ .Values.betterAuth.url | quote }}
            - name: NEXT_PUBLIC_APP_URL
              value: {{ .Values.betterAuth.url | quote }}
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.keys.betterAuthSecret }}
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.keys.internalApiSecret }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.keys.encryptionKey }}
            - name: AGENT_SERVICE_URL
              value: "http://{{ include "traceroot.fullname" . }}-agent:{{ .Values.agent.port }}"
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ include "traceroot.fullname" . }}-rest:{{ .Values.rest.port }}/api/v1"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: ENABLE_BILLING
              value: {{ .Values.enableBilling | quote }}
            # --- Branding ---
            - name: NEXT_PUBLIC_LOGO_URL
              value: {{ .Values.branding.logoUrl | quote }}
            - name: NEXT_PUBLIC_DOCS_URL
              value: {{ .Values.branding.docsUrl | quote }}
            - name: NEXT_PUBLIC_GITHUB_REPO_URL
              value: {{ .Values.branding.githubRepoUrl | quote }}
            - name: NEXT_PUBLIC_GITHUB_ISSUES_URL
              value: {{ .Values.branding.githubIssuesUrl | quote }}
            - name: NEXT_PUBLIC_DISCORD_INVITE_URL
              value: {{ .Values.branding.discordInviteUrl | quote }}
            # --- LLM keys (conditional) ---
            {{- if .Values.llmKeys }}
            {{- if .Values.llmKeys.existingSecret }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llmKeys.existingSecret }}
                  key: {{ .Values.llmKeys.keys.anthropicApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llmKeys.existingSecret }}
                  key: {{ .Values.llmKeys.keys.openaiApiKey }}
            {{- end }}
            {{- end }}
            # --- GitHub App (conditional) ---
            {{- if .Values.github }}
            {{- if .Values.github.existingSecret }}
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.existingSecret }}
                  key: {{ .Values.github.keys.appId }}
            - name: GITHUB_APP_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.existingSecret }}
                  key: {{ .Values.github.keys.appName }}
            - name: GITHUB_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.existingSecret }}
                  key: {{ .Values.github.keys.clientId }}
            - name: GITHUB_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.existingSecret }}
                  key: {{ .Values.github.keys.clientSecret }}
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.existingSecret }}
                  key: {{ .Values.github.keys.privateKey }}
            - name: GITHUB_OAUTH_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.existingSecret }}
                  key: {{ .Values.github.keys.oauthRedirectUri }}
            {{- end }}
            {{- end }}
            # --- Google OAuth (conditional) ---
            {{- if .Values.googleOAuth }}
            {{- if .Values.googleOAuth.existingSecret }}
            - name: AUTH_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.googleOAuth.existingSecret }}
                  key: {{ .Values.googleOAuth.keys.clientId }}
            - name: AUTH_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.googleOAuth.existingSecret }}
                  key: {{ .Values.googleOAuth.keys.clientSecret }}
            {{- end }}
            {{- end }}
            # --- Stripe (conditional) ---
            {{- if .Values.stripe }}
            {{- if .Values.stripe.existingSecret }}
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stripe.existingSecret }}
                  key: {{ .Values.stripe.keys.secretKey }}
            - name: STRIPE_WEBHOOK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stripe.existingSecret }}
                  key: {{ .Values.stripe.keys.webhookSigningSecret }}
            - name: STRIPE_PRICE_ID_STARTER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stripe.existingSecret }}
                  key: {{ .Values.stripe.keys.priceIdStarter }}
            - name: STRIPE_PRICE_ID_PRO
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stripe.existingSecret }}
                  key: {{ .Values.stripe.keys.priceIdPro }}
            - name: STRIPE_PRICE_ID_AI_USAGE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stripe.existingSecret }}
                  key: {{ .Values.stripe.keys.priceIdAiUsage }}
            {{- end }}
            {{- end }}
            # --- SMTP (conditional) ---
            {{- if .Values.smtp }}
            {{- if .Values.smtp.existingSecret }}
            - name: TRACEROOT_SMTP_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.existingSecret }}
                  key: {{ .Values.smtp.keys.url }}
            - name: TRACEROOT_SMTP_MAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.existingSecret }}
                  key: {{ .Values.smtp.keys.mailFrom }}
            {{- end }}
            {{- end }}
            # --- Enterprise license (conditional) ---
            {{- if .Values.enterprise }}
            {{- if .Values.enterprise.existingSecret }}
            - name: TRACEROOT_EE_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enterprise.existingSecret }}
                  key: {{ .Values.enterprise.keys.licenseKey }}
            {{- end }}
            {{- end }}
            # --- Additional env vars (escape hatch) ---
            {{- with .Values.additionalEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.web.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.web.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
