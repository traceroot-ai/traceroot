apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "traceroot.fullname" . }}-detector
  labels:
    {{- include "traceroot.labels" . | nindent 4 }}
    app: detector
spec:
  replicas: {{ .Values.detector.replicas }}
  selector:
    matchLabels:
      {{- include "traceroot.selectorLabels" . | nindent 6 }}
      app: detector
  template:
    metadata:
      labels:
        {{- include "traceroot.selectorLabels" . | nindent 8 }}
        app: detector
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: detector
          image: "{{ .Values.detector.image.repository }}:{{ .Values.detector.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.databaseUrl }}
            - name: CLICKHOUSE_HOST
              value: {{ include "traceroot.clickhouse.hostname" . | quote }}
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: CLICKHOUSE_NATIVE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.auth.existingSecret }}
                  key: {{ .Values.clickhouse.auth.existingSecretKey }}
            - name: CLICKHOUSE_DATABASE
              value: "default"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.secretKeys.url }}
            - name: REDIS_RESULT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.secretKeys.url }}
            - name: BACKEND_INTERNAL_URL
              value: "http://{{ include "traceroot.fullname" . }}-rest:{{ .Values.rest.port }}"
            - name: AGENT_SERVICE_URL
              value: "http://{{ include "traceroot.fullname" . }}-agent:{{ .Values.agent.port }}"
            - name: TRACEROOT_UI_URL
              value: "http://{{ include "traceroot.fullname" . }}-web:{{ .Values.web.port }}"
            - name: NEXT_PUBLIC_APP_URL
              value: {{ .Values.betterAuth.url | quote }}
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.keys.internalApiSecret }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.keys.encryptionKey }}
            {{- if .Values.llmKeys }}
            {{- if .Values.llmKeys.existingSecret }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llmKeys.existingSecret }}
                  key: {{ .Values.llmKeys.keys.anthropicApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llmKeys.existingSecret }}
                  key: {{ .Values.llmKeys.keys.openaiApiKey }}
            {{- end }}
            {{- end }}
            {{- if .Values.smtp }}
            {{- if .Values.smtp.existingSecret }}
            - name: TRACEROOT_SMTP_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.existingSecret }}
                  key: {{ .Values.smtp.keys.url }}
            - name: TRACEROOT_SMTP_MAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.existingSecret }}
                  key: {{ .Values.smtp.keys.mailFrom }}
            {{- end }}
            {{- end }}
            {{- with .Values.additionalEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.detector.resources | nindent 12 }}
