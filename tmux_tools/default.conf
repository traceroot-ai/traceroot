# indexing & input
set -g base-index 1
set -s escape-time 0

# terminal ----------------------------------------------------------------
set -g default-terminal "xterm-256color"
set-option -g history-limit 20000

# status bar
set -g status-bg black
set -g status-fg white
set -g status-left ""
set -g status-right "#[fg=cyan]#H"

# window appearance
set-window-option -g window-status-current-style bg=cyan
setw -g monitor-activity on

# Resize each window independently based on the smallest client viewing it,
# rather than the smallest client in the entire session.
setw -g aggressive-resize on

# navigation
# shift+arrow to cycle windows
bind -n S-Left previous-window
bind -n S-Right next-window
unbind-key p

# New windows open next to the current one
bind-key c new-window -a

# mouse & scrollback
set -g mouse on

# copy mode
setw -g mode-keys vi

# session control
# Ctrl-Q to quit
bind -n C-q kill-session
