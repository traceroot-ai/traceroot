# .github/workflows/docker-images.yml
# Builds and pushes Docker images to ECR.
# Triggered manually or on a schedule — NOT on every push.
# Build validation (build-test.yml) runs on every push/PR to catch errors early.
name: Build & Push Docker Images

on:
  # schedule:
  #   # Daily at 3am — disabled until we have a use for it
  #   - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 965747688757.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: docker/Dockerfile.web
          - service: rest
            dockerfile: docker/Dockerfile.rest
          - service: worker
            dockerfile: docker/Dockerfile.worker
          - service: billing
            dockerfile: docker/Dockerfile.billing
          - service: agent
            dockerfile: docker/Dockerfile.agent
          - service: migrate-clickhouse
            dockerfile: docker/Dockerfile.migrate-clickhouse
          - service: migrate-postgres
            dockerfile: docker/Dockerfile.migrate-postgres

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.ECR_REGISTRY }}/traceroot-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
