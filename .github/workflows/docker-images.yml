# .github/workflows/docker-images.yml
name: Build & Push Docker Images

on:
  push:
    branches: [main, pivot/agentops]
  workflow_dispatch:

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 965747688757.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # Gate: run build validation before pushing images
  validate:
    name: Validate Builds
    uses: ./.github/workflows/build-test.yml

  build-and-push:
    name: Build ${{ matrix.service }}
    needs: [validate]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: docker/Dockerfile.web
          - service: rest
            dockerfile: docker/Dockerfile.rest
          - service: worker
            dockerfile: docker/Dockerfile.worker
          - service: billing
            dockerfile: docker/Dockerfile.billing
          - service: agent
            dockerfile: docker/Dockerfile.agent
          - service: migrate-clickhouse
            dockerfile: docker/Dockerfile.migrate-clickhouse
          - service: migrate-postgres
            dockerfile: docker/Dockerfile.migrate-postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/traceroot-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
