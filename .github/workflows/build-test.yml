# .github/workflows/build-test.yml
# Validates that all TypeScript packages compile and all Docker images build.
# Runs on every PR and push to catch build errors early.
# Docker image publishing (docker-images.yml) is separate and manual/scheduled.
name: Build Validation

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: build-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript build — fast feedback on type errors (~2 min)
  # ---------------------------------------------------------------------------
  typescript-build:
    name: TypeScript Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd frontend/packages/core && pnpm db:generate

      - name: Build @traceroot/core
        run: cd frontend/packages/core && pnpm build

      - name: Build @traceroot/github
        run: cd frontend/packages/github && pnpm build

      - name: Build @traceroot/agent
        run: cd frontend/packages/agent && pnpm build

      - name: Build traceroot-worker (billing)
        run: cd frontend/worker && pnpm build

  # ---------------------------------------------------------------------------
  # Docker build — validates all 7 Dockerfiles build successfully (~8 min)
  # This is the definitive gate: catches COPY issues, missing build steps,
  # dependency mismatches, etc.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: docker/Dockerfile.web
          - service: rest
            dockerfile: docker/Dockerfile.rest
          - service: worker
            dockerfile: docker/Dockerfile.worker
          - service: billing
            dockerfile: docker/Dockerfile.billing
          - service: agent
            dockerfile: docker/Dockerfile.agent
          - service: migrate-clickhouse
            dockerfile: docker/Dockerfile.migrate-clickhouse
          - service: migrate-postgres
            dockerfile: docker/Dockerfile.migrate-postgres

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: traceroot-${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
